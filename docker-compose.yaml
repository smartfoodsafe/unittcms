services:
  unittcms:
    image: unittcms:latest
    build: .
    ports:
      - '8000:8000'
    environment:
      - PORT=8000
      - SECRET_KEY=your_secret_key_here
      - IS_DEMO=false # set to true to seed the database
      - DB_DIALECT=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=unittcms
      - DB_USER=unittcms
      - DB_PASSWORD=unittcms
    volumes:
      - db-data:/app/backend/database # legacy SQLite database (kept for data migration)
      - ./backend/public/uploads:/app/backend/public/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=unittcms
      - POSTGRES_USER=unittcms
      - POSTGRES_PASSWORD=unittcms
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U unittcms -d unittcms']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  pg-data:
